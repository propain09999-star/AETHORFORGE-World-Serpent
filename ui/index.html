<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AETHORFORGE</title>
<style>
  body{background:#050508;color:#e0e0e0;font-family:'Courier New',monospace;padding:15px;margin:0}
  h1{color:#00ff9d;text-align:center;font-size:18px;margin:10px 0}
  .sub{color:#00cfff;text-align:center;font-size:12px;margin-bottom:15px}
  .card{background:#0d0d1a;border:1px solid #1a1a3a;border-radius:8px;padding:12px;margin:10px 0}
  .label{color:#00cfff;font-size:11px;letter-spacing:2px}
  .val{color:#00ff9d;font-size:14px;margin:4px 0}
  button{background:#00ff9d;color:#000;padding:14px;margin:6px 0;width:100%;border:none;font-weight:bold;border-radius:6px;font-size:14px;cursor:pointer}
  button.blue{background:#00cfff}
  button.red{background:#ff4444}
  #output{background:#0d0d1a;border:1px solid #1a1a3a;border-radius:8px;padding:12px;margin:10px 0;min-height:80px;font-size:12px;white-space:pre-wrap}
  .mode{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
  .mode button{flex:1;padding:10px;font-size:12px}
</style>
</head>
<body>
<h1>⚡ AETHORFORGE</h1>
<div class="sub">WORLD SERPENT v1.9 • GLOBAL CYBER COMMAND</div>

<div class="card">
  <div class="label">SYSTEM STATUS</div>
  <div class="val" id="status">● ONLINE</div>
  <div style="font-size:11px;color:#888;margin-top:6px" id="time"></div>
</div>

<div class="card">
  <div class="label">QUERY</div>
  <textarea id="query" style="width:100%;background:#050508;color:#e0e0e0;border:1px solid #1a1a3a;padding:8px;border-radius:4px;font-family:monospace;font-size:13px;min-height:60px;box-sizing:border-box" placeholder="Enter query..."></textarea>
  <div class="mode">
    <button onclick="setMode('bounty')" class="blue">💰 Bounty</button>
    <button onclick="setMode('pentest')" class="blue">🎯 Pentest</button>
    <button onclick="setMode('forge')" class="blue">🔨 Forge</button>
    <button onclick="setMode('domain')" class="blue">🌐 Domain</button>
  </div>
  <button onclick="runQuery()">⚡ RUN</button>
</div>

<div class="card">
  <div class="label">OUTPUT</div>
  <div id="output">Ready...</div>
</div>

<div class="card">
  <div class="label">MEMORY STATS</div>
  <div class="val" id="mem">Connect backend to see stats</div>
</div>

<script>
let mode = 'bounty';
const API = 'http://localhost:8000';

function setMode(m){
  mode = m;
  document.querySelectorAll('.mode button').forEach(b=>b.style.opacity='0.5');
  event.target.style.opacity='1';
}

function updateTime(){
  document.getElementById('time').textContent = new Date().toLocaleString();
}
setInterval(updateTime, 1000);
updateTime();

async function runQuery(){
  const q = document.getElementById('query').value.trim();
  if(!q) return;
  document.getElementById('output').textContent = 'Processing...';
  try{
    const r = await fetch(`${API}/query`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:q, mode:mode})
    });
    const d = await r.json();
    document.getElementById('output').textContent = d.result || JSON.stringify(d);
  }catch(e){
    document.getElementById('output').textContent = 
      'Backend not running.\nStart with: python api.py\n\nQuery: '+q;
  }
}

document.getElementById('query').addEventListener('keydown', e=>{
  if(e.ctrlKey && e.key==='Enter') runQuery();
});
</script>
</body>
</html>
