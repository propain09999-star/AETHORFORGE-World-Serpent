<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080c14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>AETHORFORGE</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:       #080c14;
    --surface:  #0d1220;
    --border:   #1a2540;
    --accent:   #00e5ff;
    --accent2:  #ff3c6e;
    --gold:     #f0b429;
    --text:     #c8d8f0;
    --muted:    #4a6080;
    --success:  #00e676;
    --error:    #ff3c6e;
    --font-mono: 'Share Tech Mono', monospace;
    --font-ui:   'Rajdhani', sans-serif;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 16px;
    overflow: hidden;
  }

  /* ── SCAN LINES OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 9999;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
  }

  /* ── LAYOUT ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  /* ── HEADER ── */
  header {
    flex-shrink: 0;
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .logo {
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: 0 0 12px rgba(0,229,255,0.5);
  }

  .logo span { color: var(--accent2); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── MODE TABS ── */
  .mode-tabs {
    flex-shrink: 0;
    display: flex;
    padding: 10px 16px;
    gap: 8px;
    background: var(--bg);
  }

  .tab {
    flex: 1;
    padding: 8px 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .tab.active[data-mode="heist"] {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(255,60,110,0.08);
    text-shadow: 0 0 8px rgba(255,60,110,0.4);
  }

  .tab.active[data-mode="securelead"] {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.08);
    text-shadow: 0 0 8px rgba(0,229,255,0.4);
  }

  /* ── SCROLL AREA ── */
  #feed {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }

  #feed::-webkit-scrollbar { display: none; }

  /* ── CARDS ── */
  .card {
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
    animation: slide-in 0.3s ease-out;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .card-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .card-label.heist   { color: var(--accent2); }
  .card-label.securelead { color: var(--accent); }
  .card-label.system  { color: var(--muted); }

  .card-time {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
  }

  .card-query {
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    border-bottom: 1px solid var(--border);
    word-break: break-word;
  }

  .card-body {
    padding: 12px 14px;
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .card-body.collapsed {
    max-height: 120px;
    overflow: hidden;
    position: relative;
  }

  .card-body.collapsed::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 48px;
    background: linear-gradient(transparent, var(--surface));
  }

  .expand-btn {
    width: 100%;
    padding: 8px;
    background: transparent;
    border: none;
    border-top: 1px solid var(--border);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    text-align: center;
  }

  .agents-row {
    padding: 8px 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    border-bottom: 1px solid var(--border);
  }

  .agent-tag {
    padding: 3px 8px;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .agent-tag.heist   { background: rgba(255,60,110,0.15); color: var(--accent2); border: 1px solid rgba(255,60,110,0.3); }
  .agent-tag.securelead { background: rgba(0,229,255,0.1); color: var(--accent); border: 1px solid rgba(0,229,255,0.2); }

  /* PENDING card */
  .card.pending .card-body {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* copy button */
  .copy-btn {
    padding: 6px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .copy-btn:active { background: rgba(0,229,255,0.1); color: var(--accent); }

  /* ── HISTORY VIEW ── */
  .history-item {
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slide-in 0.2s ease-out;
    transition: border-color 0.2s;
  }

  .history-item:active { border-color: var(--accent); }

  .history-mode {
    width: 32px; height: 32px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .history-mode.heist { background: rgba(255,60,110,0.15); }
  .history-mode.securelead { background: rgba(0,229,255,0.1); }

  .history-text { flex: 1; min-width: 0; }
  .history-query { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-meta  { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 2px; }

  .history-status {
    font-family: var(--font-mono); font-size: 10px; flex-shrink: 0;
  }
  .history-status.done   { color: var(--success); }
  .history-status.error  { color: var(--error); }
  .history-status.pending { color: var(--gold); }

  /* ── EMPTY STATE ── */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 40px 24px;
    text-align: center;
  }

  .empty-icon { font-size: 40px; opacity: 0.4; }

  .empty-title {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .empty-hint { font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* ── INPUT AREA ── */
  .input-area {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 10px 12px;
    padding-bottom: calc(10px + var(--safe-bottom));
    display: flex;
    gap: 8px;
    align-items: flex-end;
    position: relative;
  }

  .input-area::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.3;
  }

  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 15px;
    line-height: 1.4;
    padding: 10px 12px;
    resize: none;
    min-height: 44px;
    max-height: 100px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  #send-btn {
    width: 44px; height: 44px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #000;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    font-weight: 700;
  }

  #send-btn:active { transform: scale(0.93); }

  #send-btn.securelead-mode {
    background: var(--accent);
  }

  #send-btn.heist-mode {
    background: var(--accent2);
  }

  #send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ── NAV BAR ── */
  nav {
    flex-shrink: 0;
    display: flex;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }

  .nav-btn {
    flex: 1;
    padding: 10px 0 calc(10px + var(--safe-bottom));
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: color 0.2s;
  }

  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 18px; }

  /* ── SETTINGS PANEL ── */
  #settings-panel {
    position: fixed;
    inset: 0;
    background: rgba(8,12,20,0.95);
    z-index: 100;
    display: flex;
    flex-direction: column;
    padding: 0 0 calc(20px + var(--safe-bottom));
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }

  #settings-panel.open { transform: translateY(0); }

  .panel-header {
    padding: 16px 16px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .close-btn {
    width: 32px; height: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  .settings-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

  .field-group { display: flex; flex-direction: column; gap: 6px; }

  .field-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .field-input {
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }

  .field-input:focus { border-color: var(--accent); }

  .save-btn {
    padding: 12px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
  }

  .info-box {
    padding: 10px 12px;
    background: rgba(0,229,255,0.06);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.5;
    color: var(--muted);
  }

  .info-box a { color: var(--accent); text-decoration: none; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 200;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">AETH<span>OR</span>FORGE</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="conn-label" style="font-family:var(--font-mono);font-size:10px;color:var(--muted);">OFFLINE</span>
      <div class="status-dot" id="status-dot" style="background:var(--muted);box-shadow:none;"></div>
    </div>
  </header>

  <!-- MODE TABS -->
  <div class="mode-tabs">
    <button class="tab active" data-mode="heist" onclick="setMode('heist')">🦹 Heist</button>
    <button class="tab" data-mode="securelead" onclick="setMode('securelead')">🛡 SecureLead</button>
  </div>

  <!-- MAIN VIEWS -->
  <div id="view-chat" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
    <div id="feed">
      <div class="empty" id="empty-state">
        <div class="empty-icon" id="empty-icon">🦹‍♂️</div>
        <div class="empty-title" id="empty-title">Zero-Sum Heist Studio</div>
        <div class="empty-hint" id="empty-hint">Ask about target selection, fork strategy, or monetization. Set your backend URL in Settings.</div>
      </div>
    </div>

    <div class="input-area">
      <textarea id="query-input" placeholder="Enter heist query..." rows="1"
        oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" class="heist-mode" onclick="submitQuery()">→</button>
    </div>
  </div>

  <div id="view-history" style="display:none;flex:1;overflow-y:auto;padding:12px 16px;gap:10px;flex-direction:column;">
    <div id="history-list" style="display:flex;flex-direction:column;gap:8px;"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav>
    <button class="nav-btn active" id="nav-chat" onclick="showView('chat')">
      <span class="nav-icon">💬</span>Chat
    </button>
    <button class="nav-btn" id="nav-history" onclick="showView('history')">
      <span class="nav-icon">📋</span>History
    </button>
    <button class="nav-btn" id="nav-settings" onclick="openSettings()">
      <span class="nav-icon">⚙️</span>Settings
    </button>
  </nav>

</div><!-- /app -->

<!-- SETTINGS PANEL -->
<div id="settings-panel">
  <div class="panel-header">
    <div class="panel-title">Configuration</div>
    <button class="close-btn" onclick="closeSettings()">✕</button>
  </div>
  <div class="settings-body">
    <div class="field-group">
      <div class="field-label">Backend URL</div>
      <input type="url" id="backend-url" class="field-input"
        placeholder="https://your-app.railway.app" />
    </div>
    <div class="info-box">
      Deploy <code>main.py</code> to Railway or Hetzner. Get a free Groq key at <a href="https://console.groq.com" target="_blank">console.groq.com</a>. Set <code>GROQ_API_KEY</code> as env variable on your server.
    </div>
    <div id="ping-result" style="font-family:var(--font-mono);font-size:11px;color:var(--muted);display:none;"></div>
    <button class="save-btn" onclick="saveSettings()">Save &amp; Test Connection</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ─── STATE ───
let currentMode = 'heist';
let backendUrl = localStorage.getItem('backendUrl') || '';
let pollingJobs = {};   // job_id → intervalId
let cards = [];         // rendered card ids

// ─── INIT ───
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('backend-url').value = backendUrl;
  if (backendUrl) checkConnection();
  autoResize(document.getElementById('query-input'));
});

// ─── MODE ───
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  const btn = document.getElementById('send-btn');
  btn.className = mode === 'heist' ? 'heist-mode' : 'securelead-mode';

  const icons = { heist: '🦹‍♂️', securelead: '🛡️' };
  const titles = { heist: 'Zero-Sum Heist Studio', securelead: 'AETHORFORGE SecureLead' };
  const hints = {
    heist: 'Ask about target selection, fork strategy, or monetization.',
    securelead: 'Describe a security incident, threat, or deception scenario.'
  };
  document.getElementById('empty-icon').textContent = icons[mode];
  document.getElementById('empty-title').textContent = titles[mode];
  document.getElementById('empty-hint').textContent = hints[mode];
  document.getElementById('query-input').placeholder =
    mode === 'heist' ? 'Enter heist query...' : 'Describe incident or threat...';
}

// ─── VIEWS ───
function showView(view) {
  document.getElementById('view-chat').style.display    = view === 'chat'    ? 'flex' : 'none';
  document.getElementById('view-history').style.display = view === 'history' ? 'flex' : 'none';
  ['chat','history'].forEach(v => {
    document.getElementById(`nav-${v}`).classList.toggle('active', v === view);
  });
  if (view === 'history') loadHistory();
}

// ─── INPUT ───
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitQuery();
  }
}

// ─── SUBMIT ───
async function submitQuery() {
  const input = document.getElementById('query-input');
  const query = input.value.trim();
  if (!query) return;
  if (!backendUrl) { openSettings(); toast('Set backend URL first'); return; }

  input.value = '';
  autoResize(input);
  document.getElementById('send-btn').disabled = true;
  document.getElementById('empty-state').style.display = 'none';

  // Render pending card
  const tempId = 'tmp-' + Date.now();
  renderPendingCard(tempId, query, currentMode);

  try {
    const res = await fetch(`${backendUrl}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, mode: currentMode })
    });
    const data = await res.json();

    if (data.status === 'cached') {
      updateCard(tempId, data.result, currentMode);
    } else if (data.job_id) {
      pollJob(tempId, data.job_id);
    } else {
      updateCardError(tempId, 'Unexpected response from server');
    }
  } catch (e) {
    updateCardError(tempId, 'Cannot reach backend — check Settings');
  } fin
